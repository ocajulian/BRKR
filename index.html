<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BRKR</title>
  </head>

  <body style="margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f3f4f6; color:#111827;">
    <div style="max-width:900px; margin:0 auto; height:100vh; display:flex; flex-direction:column;">
      
      <div style="padding:24px 20px 12px 20px; border-bottom:1px solid #e5e7eb; background:white;">
        <div style="font-size:44px; font-weight:800; letter-spacing:-1px;">BRKR</div>
        <div style="margin-top:6px; font-size:14px; color:#6b7280;">
          Motor de decisión business. Etapa explícita. Rol automático opcional.
        </div>

        <div style="display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;">
          <div>
            <label for="stage" style="display:block; font-size:12px; color:#6b7280; margin-bottom:4px;">Etapa</label>
            <select id="stage" style="padding:10px 12px; font-size:14px; border:1px solid #d1d5db; border-radius:10px; background:white;">
              <option value="IDEA">Idea</option>
              <option value="VALIDACION">Validación</option>
              <option value="OFERTA">Oferta</option>
              <option value="ADS">Ads</option>
            </select>
          </div>

          <div>
            <label for="mode" style="display:block; font-size:12px; color:#6b7280; margin-bottom:4px;">Rol</label>
            <select id="mode" style="padding:10px 12px; font-size:14px; border:1px solid #d1d5db; border-radius:10px; background:white;">
              <option value="AUTO">Auto</option>
              <option value="CODIR">CODIR</option>
              <option value="CFO">CFO</option>
              <option value="CTO">CTO</option>
              <option value="CMO">CMO</option>
              <option value="SCRAPPING">Scrapping</option>
              <option value="COPYWRITER">Copywriter</option>
              <option value="PM">Project Manager</option>
              <option value="FORMACION">Formación</option>
            </select>
          </div>
        </div>
      </div>

      <div id="chatWrap" style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
        <div id="chat" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px;">
          <div style="background:#ffffff; border:1px solid #e5e7eb; border-radius:14px; padding:14px 16px; max-width:760px;">
            <div style="font-size:12px; font-weight:700; color:#6b7280; margin-bottom:6px;">BRKR</div>
            <div style="line-height:1.5;">
              Define una etapa, deja el rol en Auto o elige uno manualmente, y escribe tu situación. 
              BRKR mantendrá el contexto de la conversación.
            </div>
          </div>
        </div>

        <div style="border-top:1px solid #e5e7eb; background:white; padding:16px 20px 20px 20px;">
          <div style="display:flex; flex-direction:column; gap:10px;">
            <textarea
              id="userInput"
              placeholder="Escribe aquí. Enter = nueva línea."
              rows="3"
              style="width:100%; resize:none; padding:14px 16px; font-size:16px; line-height:1.5; border:1px solid #d1d5db; border-radius:14px; outline:none; box-sizing:border-box;"
            ></textarea>

            <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
              <div id="status" style="font-size:13px; color:#6b7280;">Listo.</div>
              <button
                id="sendBtn"
                onclick="sendMessage()"
                style="padding:12px 18px; font-size:15px; font-weight:600; border:none; border-radius:12px; background:#111827; color:white; cursor:pointer;"
              >
                Enviar
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const chatEl = document.getElementById("chat");
      const inputEl = document.getElementById("userInput");
      const statusEl = document.getElementById("status");
      const sendBtn = document.getElementById("sendBtn");

      let conversation = [];

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function formatReply(text) {
        return escapeHtml(text)
          .replace(/\*\*/g, "")
          .replace(/^###\s?(.*)$/gm, "<strong>$1</strong>")
          .replace(/\n/g, "<br>");
      }

      function addBubble(role, content) {
        const isUser = role === "user";
        const wrapper = document.createElement("div");
        wrapper.style.display = "flex";
        wrapper.style.justifyContent = isUser ? "flex-end" : "flex-start";

        const bubble = document.createElement("div");
        bubble.style.maxWidth = "760px";
        bubble.style.padding = "14px 16px";
        bubble.style.borderRadius = "14px";
        bubble.style.border = "1px solid #e5e7eb";
        bubble.style.background = isUser ? "#111827" : "#ffffff";
        bubble.style.color = isUser ? "#ffffff" : "#111827";
        bubble.style.lineHeight = "1.5";
        bubble.style.whiteSpace = "normal";

        const label = document.createElement("div");
        label.textContent = isUser ? "Tú" : "BRKR";
        label.style.fontSize = "12px";
        label.style.fontWeight = "700";
        label.style.marginBottom = "6px";
        label.style.color = isUser ? "#d1d5db" : "#6b7280";

        const body = document.createElement("div");
        body.innerHTML = isUser ? escapeHtml(content).replace(/\n/g, "<br>") : formatReply(content);

        bubble.appendChild(label);
        bubble.appendChild(body);
        wrapper.appendChild(bubble);
        chatEl.appendChild(wrapper);

        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function setLoading(on) {
        sendBtn.disabled = on;
        sendBtn.style.opacity = on ? "0.7" : "1";
        sendBtn.style.cursor = on ? "default" : "pointer";
        statusEl.textContent = on ? "BRKR está pensando…" : "Listo.";
      }

      function autosizeTextarea() {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 220) + "px";
      }

      inputEl.addEventListener("input", autosizeTextarea);

      inputEl.addEventListener("keydown", function (e) {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
          e.preventDefault();
          sendMessage();
        }
      });

      async function sendMessage() {
        const stage = document.getElementById("stage").value;
        const mode = document.getElementById("mode").value;
        const message = inputEl.value.trim();

        if (!message) return;

        addBubble("user", message);
        conversation.push({ role: "user", content: message });

        inputEl.value = "";
        autosizeTextarea();
        setLoading(true);

        try {
          const r = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message,
              stage,
              mode,
              history: conversation
            }),
          });

          const raw = await r.text();

          let data;
          try {
            data = JSON.parse(raw);
          } catch {
            addBubble("assistant", raw);
            conversation.push({ role: "assistant", content: raw });
            setLoading(false);
            return;
          }

          const reply = data.reply || "No pude generar respuesta.";
          addBubble("assistant", reply);
          conversation.push({ role: "assistant", content: reply });
        } catch (err) {
          const msg = `Error: ${String(err)}`;
          addBubble("assistant", msg);
          conversation.push({ role: "assistant", content: msg });
        } finally {
          setLoading(false);
        }
      }

      autosizeTextarea();
    </script>
  </body>
</html>
