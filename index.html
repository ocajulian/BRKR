<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BRKR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      :root {
        --bg: #f5f6f8;
        --panel: #ffffff;
        --panel-soft: #fafafa;
        --border: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
        --accent: #111827;
        --accent-text: #ffffff;
        --bubble-user: #111827;
        --bubble-user-text: #ffffff;
        --bubble-assistant: #ffffff;
        --bubble-assistant-text: #111827;
        --input-bg: #f9fafb;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
        --glow: 0 0 0 rgba(0, 0, 0, 0);
      }

      body.theme-light {
        --bg: #f5f6f8;
        --panel: #ffffff;
        --panel-soft: #fafafa;
        --border: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
        --accent: #111827;
        --accent-text: #ffffff;
        --bubble-user: #111827;
        --bubble-user-text: #ffffff;
        --bubble-assistant: #ffffff;
        --bubble-assistant-text: #111827;
        --input-bg: #f9fafb;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
        --glow: 0 0 0 rgba(0, 0, 0, 0);
      }

      body.theme-dark {
        --bg: #0b0f14;
        --panel: #12171d;
        --panel-soft: #0f141a;
        --border: #1f2730;
        --text: #e6edf3;
        --muted: #7d8b99;
        --accent: #00e0ff;
        --accent-text: #001418;
        --bubble-user: #00e0ff;
        --bubble-user-text: #001418;
        --bubble-assistant: #151b22;
        --bubble-assistant-text: #e6edf3;
        --input-bg: #0b0f14;
        --shadow: 0 4px 20px rgba(0, 224, 255, 0.08);
        --glow: 0 0 12px rgba(0, 224, 255, 0.6);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      body {
        transition:
          background 0.18s ease,
          color 0.18s ease,
          border-color 0.18s ease,
          box-shadow 0.18s ease;
      }

      button, input, textarea, select { font: inherit; }

      .app-shell {
        height: 100vh;
        display: flex;
        background: var(--bg);
        color: var(--text);
      }

      .sidebar {
        width: 280px;
        border-right: 1px solid var(--border);
        background: var(--panel);
        display: none;
        flex-direction: column;
      }

      .sidebar-header, .sidebar-footer, .topbar {
        background: var(--panel);
      }

      .sidebar-header {
        padding: 20px;
        border-bottom: 1px solid var(--border);
      }

      .brand-title {
        font-size: 32px;
        font-weight: 800;
        letter-spacing: -1px;
      }

      .brand-subtitle, .muted {
        color: var(--muted);
      }

      .sidebar-list {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
      }

      .chat-item {
        padding: 12px;
        margin-bottom: 8px;
        border-radius: 14px;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--panel);
        transition: 0.15s ease;
      }

      .chat-item:hover {
        background: var(--panel-soft);
      }

      .chat-item.active {
        border-color: var(--accent);
        background: var(--panel-soft);
        box-shadow: var(--shadow);
      }

      .sidebar-footer {
        padding: 14px;
        border-top: 1px solid var(--border);
      }

      .user-box {
        margin-bottom: 10px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel-soft);
      }

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .screen {
        display: none;
        flex: 1;
      }

      .center-screen {
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px;
        width: 100%;
        max-width: 520px;
        box-shadow: var(--shadow);
      }

      .auth-card {
        max-width: 460px;
      }

      .topbar {
        padding: 18px 20px;
        border-bottom: 1px solid var(--border);
      }

      .topbar-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .chat-title {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -1px;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .controls-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .field label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .select, .text-input, .text-area, .btn {
        border-radius: 14px;
        border: 1px solid var(--border);
      }

      .select, .text-input {
        padding: 10px 12px;
        background: var(--panel);
        color: var(--text);
      }

      .text-area {
        width: 100%;
        resize: none;
        padding: 16px 18px;
        font-size: 16px;
        line-height: 1.6;
        background: var(--input-bg);
        color: var(--text);
        outline: none;
      }

      .btn {
        padding: 10px 12px;
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        transition:
          background 0.15s ease,
          color 0.15s ease,
          border-color 0.15s ease,
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }

      .btn:hover,
      .btn:focus-visible {
        background: var(--panel-soft);
        color: var(--text);
        border-color: var(--border);
        outline: none;
      }

      .btn-primary {
        border: none;
        background: var(--accent);
        color: var(--accent-text);
        font-weight: 700;
        box-shadow: 0 0 0 0 rgba(0, 0, 0, 0);
      }

      .btn-primary:hover,
      .btn-primary:focus-visible {
        background: var(--accent);
        color: var(--accent-text);
        border-color: transparent;
        outline: none;
      }

      body.theme-dark .btn-primary:hover,
      body.theme-dark .btn-primary:focus-visible {
        box-shadow: var(--glow);
        transform: translateY(-1px);
      }

      body.theme-light .btn-primary:hover,
      body.theme-light .btn-primary:focus-visible {
        box-shadow: 0 4px 12px rgba(17, 24, 39, 0.12);
        transform: translateY(-1px);
      }

      .btn-full {
        width: 100%;
      }

      .btn-theme-active {
        border-color: var(--accent) !important;
        background: var(--panel-soft) !important;
        color: var(--text) !important;
        box-shadow: var(--shadow);
        font-weight: 700;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 24px 120px 24px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .bubble-row {
        display: flex;
      }

      .bubble-row.user {
        justify-content: flex-end;
      }

      .bubble-row.assistant {
        justify-content: flex-start;
      }

      .bubble {
        max-width: 720px;
        padding: 14px 16px;
        border-radius: 18px;
        box-shadow: var(--shadow);
        line-height: 1.55;
      }

      .bubble.user {
        background: var(--bubble-user);
        color: var(--bubble-user-text);
        border: none;
        font-weight: 600;
      }

      .bubble.assistant {
        background: var(--bubble-assistant);
        color: var(--bubble-assistant-text);
        border: 1px solid var(--border);
      }

      .bubble-label {
        font-size: 12px;
        margin-bottom: 6px;
        opacity: 0.7;
        font-weight: 600;
      }

      .bubble-meta {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 8px;
        padding-bottom: 8px;
        border-bottom: 1px dashed var(--border);
      }

      .composer {
        border-top: 1px solid var(--border);
        background: var(--panel);
        padding: 16px 20px 20px 20px;
      }

      .composer-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
        gap: 12px;
      }

      .status {
        font-size: 12px;
        color: var(--muted);
      }

      .theme-switch {
        display: flex;
        gap: 8px;
      }

      .lang-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .small {
        font-size: 13px;
      }
    </style>
  </head>

  <body class="theme-dark">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="brand-title">BRKR</div>
          <div class="brand-subtitle small" style="margin-top:6px;">Decision engine</div>
          <button onclick="createNewChat()" class="btn btn-primary btn-full" style="margin-top:14px; padding:12px 14px;">
            New chat
          </button>
        </div>

        <div id="chatList" class="sidebar-list"></div>

        <div class="sidebar-footer">
          <div class="user-box">
            <div class="small muted" style="font-size:11px; margin-bottom:4px;">Logged in as</div>
            <div id="userEmail" class="small" style="font-weight:600; word-break:break-word;">—</div>
          </div>

          <div class="theme-switch" style="margin-bottom:10px;">
            <button id="themeLightBtn" class="btn btn-full" onclick="setTheme('light')">Clair</button>
            <button id="themeDarkBtn" class="btn btn-full" onclick="setTheme('dark')">Sombre</button>
          </div>

          <div style="display:flex; flex-direction:column; gap:8px;">
            <button class="btn btn-full" onclick="changeLanguage()">Change language</button>
            <button class="btn btn-full" onclick="logout()">Log out</button>
          </div>
        </div>
      </aside>

      <main class="main">
        <div id="authScreen" class="screen center-screen">
          <div class="card auth-card">
            <div class="brand-title" style="font-size:42px; margin-bottom:12px;">BRKR</div>
            <div class="muted small" style="margin-bottom:20px;">
              Create an account or log in to access your workspace.
            </div>

            <input id="authEmail" type="email" placeholder="Email" class="text-input" style="width:100%; margin-bottom:10px;" />
            <input id="authPassword" type="password" placeholder="Password" class="text-input" style="width:100%; margin-bottom:14px;" />

            <div style="display:flex; gap:10px;">
              <button onclick="signUp()" class="btn btn-primary btn-full" style="padding:12px 14px;">Sign up</button>
              <button onclick="signIn()" class="btn btn-full" style="padding:12px 14px;">Log in</button>
            </div>

            <div id="authStatus" class="status" style="margin-top:14px;"></div>
          </div>
        </div>

        <div id="languageScreen" class="screen center-screen">
          <div class="card">
            <div class="brand-title" style="font-size:42px; margin-bottom:12px;">BRKR</div>

            <div style="font-size:18px; font-weight:700; margin-bottom:4px;">Select your language:</div>
            <div style="font-size:18px; font-weight:700; margin-bottom:4px;">Selecciona tu idioma:</div>
            <div style="font-size:18px; font-weight:700; margin-bottom:20px;">Sélectionnez votre langue :</div>

            <div class="lang-grid">
              <button onclick="setLanguage('en')" class="btn btn-primary" style="padding:14px 16px;">English</button>
              <button onclick="setLanguage('es')" class="btn btn-primary" style="padding:14px 16px;">Español</button>
              <button onclick="setLanguage('fr')" class="btn btn-primary" style="padding:14px 16px;">Français</button>
              <button onclick="setLanguage('other')" class="btn" style="padding:14px 16px;">Other</button>
            </div>
          </div>
        </div>

        <div id="chatScreen" class="screen" style="flex-direction:column; min-height:0;">
          <div class="topbar">
            <div class="topbar-row">
              <div>
                <div id="chatTitle" class="chat-title">BRKR</div>
                <div id="topHint" class="muted small" style="margin-top:6px;">Decision engine.</div>
              </div>

              <div class="toolbar">
                <button class="btn" onclick="renameChat()">Rename</button>
                <button class="btn" onclick="clearCurrentChat()">Clear chat</button>
              </div>
            </div>

            <div class="controls-row">
              <div class="field">
                <label for="stage">Stage</label>
                <select id="stage" class="select" onchange="updateCurrentChatMeta()">
                  <option value="IDEA">IDEA</option>
                  <option value="VALIDACION">VALIDATION</option>
                  <option value="OFERTA">OFFER</option>
                  <option value="ADS">ADS</option>
                </select>
              </div>

              <div class="field">
                <label for="mode">Mode</label>
                <select id="mode" class="select" onchange="updateCurrentChatMeta()">
                  <option value="AUTO">AUTO</option>
                  <option value="CODIR">CODIR</option>
                  <option value="CFO">CFO</option>
                  <option value="CTO">CTO</option>
                  <option value="OFFER">OFFER</option>
                  <option value="CMO">CMO</option>
                  <option value="SCRAPPING">SCRAPPING</option>
                  <option value="COPYWRITER">COPYWRITER</option>
                  <option value="PM">PM</option>
                  <option value="FORMACION">TRAINING</option>
                </select>
              </div>
            </div>
          </div>

          <div id="messages" class="messages"></div>

          <div class="composer">
            <textarea id="userInput" class="text-area" placeholder="Write here..." rows="1"></textarea>

            <div class="composer-footer">
              <div id="status" class="status">Ready.</div>
              <button id="sendBtn" class="btn btn-primary" onclick="sendMessage()" style="padding:10px 16px;">
                Send
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script>
      const SUPABASE_URL = "https://wffpwrcmldytgnttjrdo.supabase.co";
      const SUPABASE_KEY = "sb_publishable_-4JKr5Z2U4rMB5mTKlQe7A_bN9p63qz";
      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const STORAGE_KEYS = {
        language: "brkr_lang",
        legacyActiveChatId: "brkr_active_chat_id",
        legacyChats: "brkr_chats",
        theme: "brkr_theme"
      };

      let chats = [];
      let activeChatId = null;
      let currentUser = null;
      let isSending = false;

      const bodyEl = document.body;
      const sidebarEl = document.getElementById("sidebar");
      const authScreenEl = document.getElementById("authScreen");
      const authStatusEl = document.getElementById("authStatus");
      const languageScreenEl = document.getElementById("languageScreen");
      const chatScreenEl = document.getElementById("chatScreen");
      const chatListEl = document.getElementById("chatList");
      const messagesEl = document.getElementById("messages");
      const inputEl = document.getElementById("userInput");
      const statusEl = document.getElementById("status");
      const sendBtn = document.getElementById("sendBtn");
      const topHintEl = document.getElementById("topHint");
      const stageEl = document.getElementById("stage");
      const modeEl = document.getElementById("mode");
      const chatTitleEl = document.getElementById("chatTitle");
      const userEmailEl = document.getElementById("userEmail");
      const themeLightBtn = document.getElementById("themeLightBtn");
      const themeDarkBtn = document.getElementById("themeDarkBtn");

      function getUserCacheKey(userId) {
        return `brkr_cloud_chats_${userId}`;
      }

      function getUserActiveChatKey(userId) {
        return `brkr_active_chat_id_${userId}`;
      }

      function updateThemeButtons(theme) {
        themeLightBtn.classList.toggle("btn-theme-active", theme === "light");
        themeDarkBtn.classList.toggle("btn-theme-active", theme === "dark");
      }

      function setTheme(theme) {
        const finalTheme = theme === "light" ? "light" : "dark";
        bodyEl.classList.remove("theme-light", "theme-dark");
        bodyEl.classList.add(finalTheme === "light" ? "theme-light" : "theme-dark");
        localStorage.setItem(STORAGE_KEYS.theme, finalTheme);
        updateThemeButtons(finalTheme);
      }

      function initTheme() {
        const saved = localStorage.getItem(STORAGE_KEYS.theme) || "dark";
        setTheme(saved);
      }

      function showAuth() {
        initTheme();
        sidebarEl.style.display = "none";
        authScreenEl.style.display = "flex";
        languageScreenEl.style.display = "none";
        chatScreenEl.style.display = "none";
      }

      function showLanguage() {
        initTheme();
        sidebarEl.style.display = "none";
        authScreenEl.style.display = "none";
        languageScreenEl.style.display = "flex";
        chatScreenEl.style.display = "none";
      }

      function showApp() {
        initTheme();
        sidebarEl.style.display = "flex";
        authScreenEl.style.display = "none";
        languageScreenEl.style.display = "none";
        chatScreenEl.style.display = "flex";
      }

      function getAuthForm() {
        return {
          email: document.getElementById("authEmail").value.trim(),
          password: document.getElementById("authPassword").value.trim()
        };
      }

      async function signUp() {
        const { email, password } = getAuthForm();
        if (!email || !password) {
          authStatusEl.textContent = "Enter email and password.";
          return;
        }
        authStatusEl.textContent = "Creating account…";
        const { error } = await supabaseClient.auth.signUp({ email, password });
        authStatusEl.textContent = error ? error.message : "Account created. Check your email if confirmation is required.";
      }

      async function signIn() {
        const { email, password } = getAuthForm();
        if (!email || !password) {
          authStatusEl.textContent = "Enter email and password.";
          return;
        }
        authStatusEl.textContent = "Logging in…";
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) {
          authStatusEl.textContent = error.message;
          return;
        }
        authStatusEl.textContent = "";
        await bootAfterAuth();
      }

      async function logout() {
        saveChatsCache();
        saveActiveChatId();
        await supabaseClient.auth.signOut();
        currentUser = null;
        chats = [];
        activeChatId = null;
        isSending = false;
        setLoading(false);
        showAuth();
      }

      async function loadCurrentUser() {
        const { data, error } = await supabaseClient.auth.getUser();
        if (error || !data?.user) {
          currentUser = null;
          userEmailEl.textContent = "—";
          return;
        }
        currentUser = data.user;
        userEmailEl.textContent = data.user.email || "—";
      }

      function saveChatsCache() {
        if (!currentUser) return;
        localStorage.setItem(getUserCacheKey(currentUser.id), JSON.stringify(chats));
      }

      function loadChatsCache() {
        if (!currentUser) return [];
        const raw = localStorage.getItem(getUserCacheKey(currentUser.id));
        if (!raw) return [];
        try {
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function saveActiveChatId() {
        if (!currentUser || !activeChatId) return;
        localStorage.setItem(getUserActiveChatKey(currentUser.id), activeChatId);
      }

      function loadActiveChatId() {
        if (!currentUser) {
          activeChatId = null;
          return;
        }

        const userKey = getUserActiveChatKey(currentUser.id);
        const userValue = localStorage.getItem(userKey);

        if (userValue) {
          activeChatId = userValue;
          return;
        }

        const legacyValue = localStorage.getItem(STORAGE_KEYS.legacyActiveChatId);
        if (legacyValue) {
          activeChatId = legacyValue;
          localStorage.setItem(userKey, legacyValue);
          localStorage.removeItem(STORAGE_KEYS.legacyActiveChatId);
          return;
        }

        activeChatId = null;
      }

      function normalizeChat(chat) {
        return {
          id: chat.id,
          title: chat.title || "New chat",
          stage: chat.stage || "IDEA",
          mode: chat.mode || "AUTO",
          conversation: Array.isArray(chat.conversation) ? chat.conversation : [],
          updated_at: chat.updated_at || new Date(0).toISOString()
        };
      }

      function mergeChats(remoteChats, localChats) {
        const map = new Map();
        for (const chat of [...remoteChats, ...localChats].map(normalizeChat)) {
          const existing = map.get(chat.id);
          if (!existing) {
            map.set(chat.id, chat);
            continue;
          }
          const existingTime = new Date(existing.updated_at || 0).getTime();
          const incomingTime = new Date(chat.updated_at || 0).getTime();
          if (incomingTime >= existingTime) {
            map.set(chat.id, chat);
          }
        }
        return Array.from(map.values()).sort((a, b) => {
          const ta = new Date(a.updated_at || 0).getTime();
          const tb = new Date(b.updated_at || 0).getTime();
          return tb - ta;
        });
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function formatReply(text) {
        return escapeHtml(text)
          .replace(/\*\*/g, "")
          .replace(/^###\s?(.*)$/gm, "<strong>$1</strong>")
          .replace(/\n/g, "<br>");
      }

      function autosizeTextarea() {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 220) + "px";
      }

      function setLoading(on) {
        const lang = localStorage.getItem(STORAGE_KEYS.language) || "en";
        isSending = on;
        sendBtn.disabled = on;
        inputEl.disabled = on;
        sendBtn.style.opacity = on ? "0.7" : "1";
        sendBtn.style.cursor = on ? "default" : "pointer";

        if (lang === "es") {
          statusEl.textContent = on ? "BRKR está pensando…" : "Listo.";
        } else if (lang === "fr") {
          statusEl.textContent = on ? "BRKR réfléchit…" : "Prêt.";
        } else {
          statusEl.textContent = on ? "BRKR is thinking…" : "Ready.";
        }
      }

      function generateId() {
        return "chat_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
      }

      function getCurrentChat() {
        return chats.find((chat) => chat.id === activeChatId) || null;
      }

      function getLanguage() {
        return localStorage.getItem(STORAGE_KEYS.language) || "en";
      }

      function setLanguage(lang) {
        localStorage.setItem(STORAGE_KEYS.language, lang);
        startApp();
      }

      function changeLanguage() {
        localStorage.removeItem(STORAGE_KEYS.language);
        showLanguage();
      }

      async function fetchChatsFromSupabase() {
        if (!currentUser) return [];
        const { data, error } = await supabaseClient
          .from("chats")
          .select("*")
          .eq("user_id", currentUser.id)
          .order("updated_at", { ascending: false });

        if (error) {
          console.error("Fetch chats error:", error);
          return [];
        }

        return (data || []).map((row) =>
          normalizeChat({
            id: row.id,
            title: row.title,
            stage: row.stage,
            mode: row.mode,
            conversation: row.conversation,
            updated_at: row.updated_at
          })
        );
      }

      async function saveChatToSupabase(chat) {
        if (!currentUser || !chat) return;

        const timestamp = new Date().toISOString();
        chat.updated_at = timestamp;

        const payload = {
          id: chat.id,
          user_id: currentUser.id,
          title: chat.title || "New chat",
          stage: chat.stage || "IDEA",
          mode: chat.mode || "AUTO",
          conversation: Array.isArray(chat.conversation) ? chat.conversation : [],
          updated_at: timestamp
        };

        const savePromise = supabaseClient.from("chats").upsert(payload);
        const timeoutPromise = new Promise((_, reject) =>
          setTimeout(() => reject(new Error("Supabase save timeout")), 8000)
        );

        try {
          const result = await Promise.race([savePromise, timeoutPromise]);
          if (result?.error) {
            console.error("Save chat error:", result.error);
          }
        } catch (error) {
          console.error("Save chat timeout/error:", error);
        }

        saveChatsCache();
        saveActiveChatId();
      }

      function queueRemoteSave(chat) {
        saveChatToSupabase(chat).catch((error) => {
          console.error("Background save failed:", error);
        });
      }

      async function migrateLegacyLocalChatsIfNeeded() {
        if (!currentUser) return;
        const migrationKey = `brkr_migrated_${currentUser.id}`;
        if (localStorage.getItem(migrationKey) === "done") return;

        const raw = localStorage.getItem(STORAGE_KEYS.legacyChats);
        if (!raw) {
          localStorage.setItem(migrationKey, "done");
          return;
        }

        let legacyChats = [];
        try {
          const parsed = JSON.parse(raw);
          legacyChats = Array.isArray(parsed) ? parsed : [];
        } catch {
          legacyChats = [];
        }

        if (legacyChats.length === 0) {
          localStorage.setItem(migrationKey, "done");
          return;
        }

        for (const chat of legacyChats) {
          const normalized = normalizeChat({
            id: chat.id || generateId(),
            title: chat.title || "New chat",
            stage: chat.stage || "IDEA",
            mode: chat.mode || "AUTO",
            conversation: Array.isArray(chat.conversation) ? chat.conversation : [],
            updated_at: new Date().toISOString()
          });
          await saveChatToSupabase(normalized);
        }

        localStorage.setItem(migrationKey, "done");
      }

      function deriveChatTitle(chat) {
        const firstUserMessage = chat.conversation.find((msg) => msg.role === "user");
        if (!firstUserMessage) return "New chat";
        return firstUserMessage.content.trim().slice(0, 36) || "New chat";
      }

      async function renameChat() {
        const chat = getCurrentChat();
        if (!chat) return;
        const currentName = chat.title || "New chat";
        const newName = window.prompt("Rename chat:", currentName);
        if (newName === null) return;
        const cleanName = newName.trim();
        if (!cleanName) return;
        chat.title = cleanName;
        await persistCurrentState({ syncRemote: true });
      }

      function renderChatList() {
        chatListEl.innerHTML = "";
        chats.forEach((chat) => {
          const isActive = chat.id === activeChatId;
          const item = document.createElement("div");
          item.className = `chat-item ${isActive ? "active" : ""}`;
          item.onclick = () => switchChat(chat.id);

          const title = document.createElement("div");
          title.textContent = chat.title || "New chat";
          title.style.fontSize = "14px";
          title.style.fontWeight = "600";
          title.style.whiteSpace = "nowrap";
          title.style.overflow = "hidden";
          title.style.textOverflow = "ellipsis";

          const meta = document.createElement("div");
          meta.textContent = `${chat.stage || "IDEA"} · ${chat.mode || "AUTO"}`;
          meta.style.marginTop = "4px";
          meta.style.fontSize = "12px";
          meta.style.color = "var(--muted)";

          item.appendChild(title);
          item.appendChild(meta);
          chatListEl.appendChild(item);
        });
      }

      function addBubble(role, content, meta = null) {
        const isUser = role === "user";
        const row = document.createElement("div");
        row.className = `bubble-row ${isUser ? "user" : "assistant"}`;

        const bubble = document.createElement("div");
        bubble.className = `bubble ${isUser ? "user" : "assistant"}`;

        const label = document.createElement("div");
        label.className = "bubble-label";
        label.textContent = isUser ? "You" : "BRKR";
        bubble.appendChild(label);

        if (!isUser && meta) {
          const metaLine = document.createElement("div");
          metaLine.className = "bubble-meta";
          metaLine.textContent = `Stage: ${meta.stage_used || "—"} · Mode used: ${meta.mode_used || "—"}`;
          bubble.appendChild(metaLine);
        }

        const body = document.createElement("div");
        body.innerHTML = isUser
          ? escapeHtml(content).replace(/\n/g, "<br>")
          : formatReply(content);

        bubble.appendChild(body);
        row.appendChild(bubble);
        messagesEl.appendChild(row);
      }

      function addSystemWelcome(text) {
        addBubble("assistant", text, null);
      }

      function getWelcomeMessage() {
        const lang = getLanguage();
        if (lang === "es") return "BRKR responderá en español. Puedes dejar AUTO o elegir stage y mode manualmente.";
        if (lang === "fr") return "BRKR répondra en français. Vous pouvez laisser AUTO ou choisir stage et mode manuellement.";
        if (lang === "other") return "Write in your language. BRKR will adapt automatically. You can also choose stage and mode manually.";
        return "BRKR will reply in English. You can leave AUTO on or choose stage and mode manually.";
      }

      function applyLanguageUI() {
        const lang = getLanguage();
        if (lang === "es") {
          topHintEl.textContent = "Motor de decisión.";
          statusEl.textContent = "Listo.";
          inputEl.placeholder = "Escribe aquí...";
          sendBtn.textContent = "Enviar";
        } else if (lang === "fr") {
          topHintEl.textContent = "Moteur de décision.";
          statusEl.textContent = "Prêt.";
          inputEl.placeholder = "Écrivez ici...";
          sendBtn.textContent = "Envoyer";
        } else if (lang === "other") {
          topHintEl.textContent = "Decision engine.";
          statusEl.textContent = "Ready.";
          inputEl.placeholder = "Write in your language...";
          sendBtn.textContent = "Send";
        } else {
          topHintEl.textContent = "Decision engine.";
          statusEl.textContent = "Ready.";
          inputEl.placeholder = "Write here...";
          sendBtn.textContent = "Send";
        }
      }

      function renderCurrentChat() {
        const chat = getCurrentChat();
        if (!chat) return;

        messagesEl.innerHTML = "";
        chatTitleEl.textContent = chat.title || "New chat";
        stageEl.value = chat.stage || "IDEA";
        modeEl.value = chat.mode || "AUTO";

        if (!chat.conversation || chat.conversation.length === 0) {
          addSystemWelcome(getWelcomeMessage());
        } else {
          chat.conversation.forEach((msg) => addBubble(msg.role, msg.content, msg.meta || null));
        }

        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function switchChat(chatId) {
        activeChatId = chatId;
        saveActiveChatId();
        renderChatList();
        renderCurrentChat();
      }

      async function createNewChat() {
        const newChat = normalizeChat({
          id: generateId(),
          title: "New chat",
          stage: "IDEA",
          mode: "AUTO",
          conversation: [],
          updated_at: new Date().toISOString()
        });

        chats.unshift(newChat);
        activeChatId = newChat.id;
        saveActiveChatId();
        renderChatList();
        renderCurrentChat();
        saveChatsCache();
        queueRemoteSave(newChat);
      }

      async function clearCurrentChat() {
        const chat = getCurrentChat();
        if (!chat) return;
        chat.conversation = [];
        chat.title = "New chat";
        await persistCurrentState({ syncRemote: true });
      }

      async function updateCurrentChatMeta() {
        const chat = getCurrentChat();
        if (!chat) return;
        chat.stage = stageEl.value;
        chat.mode = modeEl.value;
        await persistCurrentState({ syncRemote: true });
      }

      async function persistCurrentState(options = {}) {
        const { syncRemote = true } = options;
        const chat = getCurrentChat();
        if (!chat) return;

        renderChatList();
        renderCurrentChat();
        saveChatsCache();
        saveActiveChatId();

        if (syncRemote) {
          await saveChatToSupabase(chat);
        }
      }

      inputEl.addEventListener("input", autosizeTextarea);

      inputEl.addEventListener("keydown", function (e) {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
          e.preventDefault();
          sendMessage();
        }
      });

      async function sendMessage() {
        if (isSending) return;

        const chat = getCurrentChat();
        if (!chat) return;

        const lang = getLanguage();
        const message = inputEl.value.trim();
        if (!message) return;

        setLoading(true);

        chat.stage = stageEl.value;
        chat.mode = modeEl.value;
        chat.conversation.push({ role: "user", content: message });

        if (chat.title === "New chat") {
          chat.title = deriveChatTitle(chat);
        }

        await persistCurrentState({ syncRemote: false });
        queueRemoteSave(chat);

        inputEl.value = "";
        autosizeTextarea();

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 45000);

        try {
          const r = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message,
              history: chat.conversation.map((m) => ({
                role: m.role,
                content: m.content
              })),
              language: lang,
              stage: chat.stage,
              mode: chat.mode
            }),
            signal: controller.signal
          });

          const raw = await r.text();

          let data;
          try {
            data = JSON.parse(raw);
          } catch {
            chat.conversation.push({ role: "assistant", content: raw, meta: null });
            await persistCurrentState({ syncRemote: false });
            return;
          }

          const reply = data.reply || "No response.";
          chat.conversation.push({
            role: "assistant",
            content: reply,
            meta: data.meta || null
          });

          await persistCurrentState({ syncRemote: false });
        } catch (err) {
          const msg =
            err.name === "AbortError"
              ? "Error: request timeout. Try again."
              : `Error: ${String(err)}`;

          chat.conversation.push({ role: "assistant", content: msg, meta: null });
          await persistCurrentState({ syncRemote: false });
        } finally {
          clearTimeout(timeout);
          setLoading(false);
          queueRemoteSave(chat);
          inputEl.focus();
        }
      }

      async function startApp() {
        initTheme();
        await loadCurrentUser();
        showApp();

        loadActiveChatId();
        await migrateLegacyLocalChatsIfNeeded();

        const remoteChats = await fetchChatsFromSupabase();
        const localChats = loadChatsCache();
        chats = mergeChats(remoteChats, localChats);

        const exists = chats.some((chat) => chat.id === activeChatId);

        if (chats.length === 0) {
          await createNewChat();
          const freshRemote = await fetchChatsFromSupabase();
          chats = mergeChats(freshRemote, loadChatsCache());
        } else {
          for (const chat of chats) {
            queueRemoteSave(chat);
          }
        }

        if (!exists && chats.length > 0) {
          activeChatId = chats[0].id;
          saveActiveChatId();
        }

        saveChatsCache();
        applyLanguageUI();
        renderChatList();
        renderCurrentChat();
        autosizeTextarea();
        setLoading(false);
      }

      async function bootAfterAuth() {
        initTheme();
        const lang = localStorage.getItem(STORAGE_KEYS.language);
        if (!lang) {
          showLanguage();
        } else {
          await startApp();
        }
      }

      async function init() {
        initTheme();

        const { data } = await supabaseClient.auth.getSession();

        if (!data.session) {
          showAuth();
        } else {
          await bootAfterAuth();
        }

        supabaseClient.auth.onAuthStateChange(async (_event, session) => {
          if (!session) {
            showAuth();
          } else {
            await bootAfterAuth();
          }
        });

        autosizeTextarea();
      }

      init();
    </script>
  </body>
</html>
