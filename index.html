<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BRKR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>

  <body style="margin:0; font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f3f4f6; color:#111827;">
    <div style="height:100vh; display:flex;">

      <!-- SIDEBAR -->
      <aside id="sidebar" style="width:280px; border-right:1px solid #e5e7eb; background:white; display:none; flex-direction:column;">
        <div style="padding:20px; border-bottom:1px solid #e5e7eb;">
          <div style="font-size:32px; font-weight:800; letter-spacing:-1px;">BRKR</div>
          <div style="margin-top:6px; font-size:13px; color:#6b7280;">Cloud multi-chat</div>
          <button
            onclick="createNewChat()"
            style="margin-top:14px; width:100%; padding:12px 14px; border:none; border-radius:12px; background:#111827; color:white; font-size:14px; font-weight:600; cursor:pointer;"
          >
            New chat
          </button>
        </div>

        <div id="chatList" style="flex:1; overflow-y:auto; padding:10px;"></div>

        <div style="padding:14px; border-top:1px solid #e5e7eb; background:#fafafa;">
          <div style="margin-bottom:10px; padding:10px 12px; border:1px solid #e5e7eb; border-radius:10px; background:white;">
            <div style="font-size:11px; color:#6b7280; margin-bottom:4px;">Logged in as</div>
            <div id="userEmail" style="font-size:13px; font-weight:600; word-break:break-word;">—</div>
          </div>

          <div style="display:flex; flex-direction:column; gap:8px;">
            <button
              onclick="changeLanguage()"
              style="width:100%; padding:10px 12px; font-size:13px; border:1px solid #d1d5db; border-radius:10px; background:white; color:#111827; cursor:pointer;"
            >
              Change language
            </button>
            <button
              onclick="logout()"
              style="width:100%; padding:10px 12px; font-size:13px; border:1px solid #d1d5db; border-radius:10px; background:white; color:#111827; cursor:pointer;"
            >
              Log out
            </button>
          </div>
        </div>
      </aside>

      <!-- MAIN -->
      <main style="flex:1; display:flex; flex-direction:column; min-width:0;">

        <!-- AUTH SCREEN -->
        <div id="authScreen" style="display:none; flex:1; align-items:center; justify-content:center; padding:24px;">
          <div style="background:white; border:1px solid #e5e7eb; border-radius:18px; padding:32px; width:100%; max-width:460px; box-sizing:border-box;">
            <div style="font-size:42px; font-weight:800; letter-spacing:-1px; margin-bottom:12px;">BRKR</div>
            <div style="font-size:15px; color:#6b7280; margin-bottom:20px;">Create an account or log in to access your workspace.</div>

            <input
              id="authEmail"
              type="email"
              placeholder="Email"
              style="width:100%; padding:12px 14px; margin-bottom:10px; border:1px solid #d1d5db; border-radius:12px; box-sizing:border-box; font-size:15px;"
            />

            <input
              id="authPassword"
              type="password"
              placeholder="Password"
              style="width:100%; padding:12px 14px; margin-bottom:14px; border:1px solid #d1d5db; border-radius:12px; box-sizing:border-box; font-size:15px;"
            />

            <div style="display:flex; gap:10px;">
              <button
                onclick="signUp()"
                style="flex:1; padding:12px 14px; border:none; border-radius:12px; background:#111827; color:white; font-size:14px; font-weight:600; cursor:pointer;"
              >
                Sign up
              </button>
              <button
                onclick="signIn()"
                style="flex:1; padding:12px 14px; border:1px solid #d1d5db; border-radius:12px; background:white; color:#111827; font-size:14px; font-weight:600; cursor:pointer;"
              >
                Log in
              </button>
            </div>

            <div id="authStatus" style="margin-top:14px; font-size:13px; color:#6b7280;"></div>
          </div>
        </div>

        <!-- LANGUAGE SCREEN -->
        <div id="languageScreen" style="display:none; flex:1; align-items:center; justify-content:center; padding:24px;">
          <div style="background:white; border:1px solid #e5e7eb; border-radius:18px; padding:32px; width:100%; max-width:520px; box-sizing:border-box;">
            <div style="font-size:42px; font-weight:800; letter-spacing:-1px; margin-bottom:12px;">BRKR</div>

            <div style="font-size:18px; font-weight:700; margin-bottom:4px;">Select your language:</div>
            <div style="font-size:18px; font-weight:700; margin-bottom:4px;">Selecciona tu idioma:</div>
            <div style="font-size:18px; font-weight:700; margin-bottom:20px;">Sélectionnez votre langue :</div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
              <button onclick="setLanguage('en')" style="padding:14px 16px; border:none; border-radius:12px; background:#111827; color:white; font-size:15px; cursor:pointer;">English</button>
              <button onclick="setLanguage('es')" style="padding:14px 16px; border:none; border-radius:12px; background:#111827; color:white; font-size:15px; cursor:pointer;">Español</button>
              <button onclick="setLanguage('fr')" style="padding:14px 16px; border:none; border-radius:12px; background:#111827; color:white; font-size:15px; cursor:pointer;">Français</button>
              <button onclick="setLanguage('other')" style="padding:14px 16px; border:1px solid #d1d5db; border-radius:12px; background:white; color:#111827; font-size:15px; cursor:pointer;">Other</button>
            </div>
          </div>
        </div>

        <!-- CHAT SCREEN -->
        <div id="chatScreen" style="display:none; flex:1; flex-direction:column; min-height:0;">
          <div style="padding:20px; border-bottom:1px solid #e5e7eb; background:white;">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px;">
              <div>
                <div id="chatTitle" style="font-size:28px; font-weight:800; letter-spacing:-1px;">
                  BRKR
                </div>
                <div id="topHint" style="margin-top:6px; font-size:14px; color:#6b7280;">
                  Business decision engine.
                </div>
              </div>

              <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button
                  onclick="renameChat()"
                  style="padding:10px 12px; font-size:13px; border:1px solid #d1d5db; border-radius:10px; background:white; color:#111827; cursor:pointer;"
                >
                  Rename
                </button>

                <button
                  onclick="clearCurrentChat()"
                  style="padding:10px 12px; font-size:13px; border:1px solid #d1d5db; border-radius:10px; background:white; color:#111827; cursor:pointer;"
                >
                  Clear chat
                </button>
              </div>
            </div>

            <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:16px;">
              <div>
                <label for="stage" style="display:block; font-size:12px; color:#6b7280; margin-bottom:4px;">Stage</label>
                <select id="stage" onchange="updateCurrentChatMeta()" style="padding:10px 12px; font-size:14px; border:1px solid #d1d5db; border-radius:10px; background:white;">
                  <option value="IDEA">IDEA</option>
                  <option value="VALIDACION">VALIDATION</option>
                  <option value="OFERTA">OFFER</option>
                  <option value="ADS">ADS</option>
                </select>
              </div>

              <div>
                <label for="mode" style="display:block; font-size:12px; color:#6b7280; margin-bottom:4px;">Mode</label>
                <select id="mode" onchange="updateCurrentChatMeta()" style="padding:10px 12px; font-size:14px; border:1px solid #d1d5db; border-radius:10px; background:white;">
                  <option value="AUTO">AUTO</option>
                  <option value="CODIR">CODIR</option>
                  <option value="CFO">CFO</option>
                  <option value="CTO">CTO</option>
                  <option value="CMO">CMO</option>
                  <option value="SCRAPPING">SCRAPPING</option>
                  <option value="COPYWRITER">COPYWRITER</option>
                  <option value="PM">PM</option>
                  <option value="FORMACION">TRAINING</option>
                </select>
              </div>
            </div>
          </div>

          <div id="messages" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px;"></div>

          <div style="border-top:1px solid #e5e7eb; background:white; padding:16px 20px 20px 20px;">
            <textarea
              id="userInput"
              placeholder="Write here..."
              rows="3"
              style="width:100%; resize:none; padding:14px 16px; font-size:16px; line-height:1.5; border:1px solid #d1d5db; border-radius:14px; outline:none; box-sizing:border-box;"
            ></textarea>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px; gap:12px;">
              <div id="status" style="font-size:13px; color:#6b7280;">Ready.</div>
              <button
                id="sendBtn"
                onclick="sendMessage()"
                style="padding:12px 18px; font-size:15px; font-weight:600; border:none; border-radius:12px; background:#111827; color:white; cursor:pointer;"
              >
                Send
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script>
      const SUPABASE_URL = "https://wffpwrcmldytgnttjrdo.supabase.co";
      const SUPABASE_KEY = "sb_publishable_-4JKr5Z2U4rMB5mTKlQe7A_bN9p63qz";
      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const STORAGE_KEYS = {
        language: "brkr_lang",
        activeChatId: "brkr_active_chat_id",
        legacyChats: "brkr_chats"
      };

      let chats = [];
      let activeChatId = null;
      let currentUser = null;

      const sidebarEl = document.getElementById("sidebar");
      const authScreenEl = document.getElementById("authScreen");
      const authStatusEl = document.getElementById("authStatus");
      const languageScreenEl = document.getElementById("languageScreen");
      const chatScreenEl = document.getElementById("chatScreen");
      const chatListEl = document.getElementById("chatList");
      const messagesEl = document.getElementById("messages");
      const inputEl = document.getElementById("userInput");
      const statusEl = document.getElementById("status");
      const sendBtn = document.getElementById("sendBtn");
      const topHintEl = document.getElementById("topHint");
      const stageEl = document.getElementById("stage");
      const modeEl = document.getElementById("mode");
      const chatTitleEl = document.getElementById("chatTitle");
      const userEmailEl = document.getElementById("userEmail");

      function showAuth() {
        sidebarEl.style.display = "none";
        authScreenEl.style.display = "flex";
        languageScreenEl.style.display = "none";
        chatScreenEl.style.display = "none";
      }

      function showLanguage() {
        sidebarEl.style.display = "none";
        authScreenEl.style.display = "none";
        languageScreenEl.style.display = "flex";
        chatScreenEl.style.display = "none";
      }

      function showApp() {
        sidebarEl.style.display = "flex";
        authScreenEl.style.display = "none";
        languageScreenEl.style.display = "none";
        chatScreenEl.style.display = "flex";
      }

      function getAuthForm() {
        return {
          email: document.getElementById("authEmail").value.trim(),
          password: document.getElementById("authPassword").value.trim()
        };
      }

      async function signUp() {
        const { email, password } = getAuthForm();

        if (!email || !password) {
          authStatusEl.textContent = "Enter email and password.";
          return;
        }

        authStatusEl.textContent = "Creating account…";

        const { error } = await supabaseClient.auth.signUp({ email, password });

        authStatusEl.textContent = error
          ? error.message
          : "Account created. Check your email if confirmation is required.";
      }

      async function signIn() {
        const { email, password } = getAuthForm();

        if (!email || !password) {
          authStatusEl.textContent = "Enter email and password.";
          return;
        }

        authStatusEl.textContent = "Logging in…";

        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
          authStatusEl.textContent = error.message;
          return;
        }

        authStatusEl.textContent = "";
        await bootAfterAuth();
      }

      async function logout() {
        await supabaseClient.auth.signOut();
        currentUser = null;
        chats = [];
        activeChatId = null;
        localStorage.removeItem(STORAGE_KEYS.activeChatId);
        showAuth();
      }

      async function loadCurrentUser() {
        const { data, error } = await supabaseClient.auth.getUser();

        if (error || !data?.user) {
          currentUser = null;
          userEmailEl.textContent = "—";
          return;
        }

        currentUser = data.user;
        userEmailEl.textContent = data.user.email || "—";
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function formatReply(text) {
        return escapeHtml(text)
          .replace(/\*\*/g, "")
          .replace(/^###\s?(.*)$/gm, "<strong>$1</strong>")
          .replace(/\n/g, "<br>");
      }

      function autosizeTextarea() {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 220) + "px";
      }

      function setLoading(on) {
        const lang = localStorage.getItem(STORAGE_KEYS.language) || "en";
        sendBtn.disabled = on;
        sendBtn.style.opacity = on ? "0.7" : "1";
        sendBtn.style.cursor = on ? "default" : "pointer";

        if (lang === "es") {
          statusEl.textContent = on ? "BRKR está pensando…" : "Listo.";
        } else if (lang === "fr") {
          statusEl.textContent = on ? "BRKR réfléchit…" : "Prêt.";
        } else {
          statusEl.textContent = on ? "BRKR is thinking…" : "Ready.";
        }
      }

      function generateId() {
        return "chat_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
      }

      function getCurrentChat() {
        return chats.find(chat => chat.id === activeChatId) || null;
      }

      function saveActiveChatId() {
        if (activeChatId) {
          localStorage.setItem(STORAGE_KEYS.activeChatId, activeChatId);
        }
      }

      function loadActiveChatId() {
        activeChatId = localStorage.getItem(STORAGE_KEYS.activeChatId);
      }

      function getLanguage() {
        return localStorage.getItem(STORAGE_KEYS.language) || "en";
      }

      function setLanguage(lang) {
        localStorage.setItem(STORAGE_KEYS.language, lang);
        startApp();
      }

      function changeLanguage() {
        localStorage.removeItem(STORAGE_KEYS.language);
        showLanguage();
      }

      async function fetchChatsFromSupabase() {
        if (!currentUser) return [];

        const { data, error } = await supabaseClient
          .from("chats")
          .select("*")
          .eq("user_id", currentUser.id)
          .order("updated_at", { ascending: false });

        if (error) {
          console.error("Fetch chats error:", error);
          return [];
        }

        return (data || []).map((row) => ({
          id: row.id,
          title: row.title || "New chat",
          stage: row.stage || "IDEA",
          mode: row.mode || "AUTO",
          conversation: Array.isArray(row.conversation) ? row.conversation : []
        }));
      }

      async function saveChatToSupabase(chat) {
        if (!currentUser || !chat) return;

        const payload = {
          id: chat.id,
          user_id: currentUser.id,
          title: chat.title || "New chat",
          stage: chat.stage || "IDEA",
          mode: chat.mode || "AUTO",
          conversation: Array.isArray(chat.conversation) ? chat.conversation : [],
          updated_at: new Date().toISOString()
        };

        const { error } = await supabaseClient.from("chats").upsert(payload);

        if (error) {
          console.error("Save chat error:", error);
        }
      }

      async function deleteChatFromSupabase(chatId) {
        if (!currentUser || !chatId) return;

        const { error } = await supabaseClient
          .from("chats")
          .delete()
          .eq("id", chatId)
          .eq("user_id", currentUser.id);

        if (error) {
          console.error("Delete chat error:", error);
        }
      }

      async function migrateLegacyLocalChatsIfNeeded() {
        if (!currentUser) return;

        const migrationKey = `brkr_migrated_${currentUser.id}`;
        if (localStorage.getItem(migrationKey) === "done") return;

        const raw = localStorage.getItem(STORAGE_KEYS.legacyChats);
        if (!raw) {
          localStorage.setItem(migrationKey, "done");
          return;
        }

        let legacyChats = [];
        try {
          const parsed = JSON.parse(raw);
          legacyChats = Array.isArray(parsed) ? parsed : [];
        } catch {
          legacyChats = [];
        }

        if (legacyChats.length === 0) {
          localStorage.setItem(migrationKey, "done");
          return;
        }

        for (const chat of legacyChats) {
          await saveChatToSupabase({
            id: chat.id || generateId(),
            title: chat.title || "New chat",
            stage: chat.stage || "IDEA",
            mode: chat.mode || "AUTO",
            conversation: Array.isArray(chat.conversation) ? chat.conversation : []
          });
        }

        localStorage.setItem(migrationKey, "done");
      }

      function deriveChatTitle(chat) {
        const firstUserMessage = chat.conversation.find((msg) => msg.role === "user");
        if (!firstUserMessage) return "New chat";
        return firstUserMessage.content.trim().slice(0, 36) || "New chat";
      }

      function renameChat() {
        const chat = getCurrentChat();
        if (!chat) return;

        const currentName = chat.title || "New chat";
        const newName = window.prompt("Rename chat:", currentName);

        if (newName === null) return;

        const cleanName = newName.trim();
        if (!cleanName) return;

        chat.title = cleanName;
        persistCurrentState();
      }

      function renderChatList() {
        chatListEl.innerHTML = "";

        chats.forEach((chat) => {
          const isActive = chat.id === activeChatId;

          const item = document.createElement("div");
          item.style.padding = "12px 12px";
          item.style.marginBottom = "8px";
          item.style.borderRadius = "12px";
          item.style.cursor = "pointer";
          item.style.border = isActive ? "1px solid #111827" : "1px solid #e5e7eb";
          item.style.background = isActive ? "#f9fafb" : "#ffffff";
          item.onclick = () => switchChat(chat.id);

          const title = document.createElement("div");
          title.textContent = chat.title || "New chat";
          title.style.fontSize = "14px";
          title.style.fontWeight = "600";
          title.style.whiteSpace = "nowrap";
          title.style.overflow = "hidden";
          title.style.textOverflow = "ellipsis";

          const meta = document.createElement("div");
          meta.textContent = `${chat.stage || "IDEA"} · ${chat.mode || "AUTO"}`;
          meta.style.marginTop = "4px";
          meta.style.fontSize = "12px";
          meta.style.color = "#6b7280";

          item.appendChild(title);
          item.appendChild(meta);
          chatListEl.appendChild(item);
        });
      }

      function addBubble(role, content) {
        const isUser = role === "user";
        const wrapper = document.createElement("div");
        wrapper.style.display = "flex";
        wrapper.style.justifyContent = isUser ? "flex-end" : "flex-start";

        const bubble = document.createElement("div");
        bubble.style.maxWidth = "760px";
        bubble.style.padding = "14px 16px";
        bubble.style.borderRadius = "14px";
        bubble.style.border = "1px solid #e5e7eb";
        bubble.style.background = isUser ? "#111827" : "#ffffff";
        bubble.style.color = isUser ? "#ffffff" : "#111827";
        bubble.style.lineHeight = "1.5";

        const label = document.createElement("div");
        label.textContent = isUser ? "You" : "BRKR";
        label.style.fontSize = "12px";
        label.style.fontWeight = "700";
        label.style.marginBottom = "6px";
        label.style.color = isUser ? "#d1d5db" : "#6b7280";

        const body = document.createElement("div");
        body.innerHTML = isUser
          ? escapeHtml(content).replace(/\n/g, "<br>")
          : formatReply(content);

        bubble.appendChild(label);
        bubble.appendChild(body);
        wrapper.appendChild(bubble);
        messagesEl.appendChild(wrapper);
      }

      function addSystemWelcome(text) {
        const wrapper = document.createElement("div");
        wrapper.style.display = "flex";
        wrapper.style.justifyContent = "flex-start";

        const bubble = document.createElement("div");
        bubble.style.maxWidth = "760px";
        bubble.style.padding = "14px 16px";
        bubble.style.borderRadius = "14px";
        bubble.style.border = "1px solid #e5e7eb";
        bubble.style.background = "#ffffff";
        bubble.style.color = "#111827";
        bubble.style.lineHeight = "1.5";

        const label = document.createElement("div");
        label.textContent = "BRKR";
        label.style.fontSize = "12px";
        label.style.fontWeight = "700";
        label.style.marginBottom = "6px";
        label.style.color = "#6b7280";

        const body = document.createElement("div");
        body.innerHTML = escapeHtml(text);

        bubble.appendChild(label);
        bubble.appendChild(body);
        wrapper.appendChild(bubble);
        messagesEl.appendChild(wrapper);
      }

      function getWelcomeMessage() {
        const lang = getLanguage();

        if (lang === "es") {
          return "BRKR responderá en español. Puedes dejar AUTO o elegir stage y mode manualmente.";
        } else if (lang === "fr") {
          return "BRKR répondra en français. Vous pouvez laisser AUTO ou choisir stage et mode manuellement.";
        } else if (lang === "other") {
          return "Write in your language. BRKR will adapt automatically. You can also choose stage and mode manually.";
        }
        return "BRKR will reply in English. You can leave AUTO on or choose stage and mode manually.";
      }

      function applyLanguageUI() {
        const lang = getLanguage();

        if (lang === "es") {
          topHintEl.textContent = "Motor de decisión business.";
          statusEl.textContent = "Listo.";
          inputEl.placeholder = "Escribe aquí...";
          sendBtn.textContent = "Enviar";
        } else if (lang === "fr") {
          topHintEl.textContent = "Moteur de décision business.";
          statusEl.textContent = "Prêt.";
          inputEl.placeholder = "Écrivez ici...";
          sendBtn.textContent = "Envoyer";
        } else if (lang === "other") {
          topHintEl.textContent = "Business decision engine.";
          statusEl.textContent = "Ready.";
          inputEl.placeholder = "Write in your language...";
          sendBtn.textContent = "Send";
        } else {
          topHintEl.textContent = "Business decision engine.";
          statusEl.textContent = "Ready.";
          inputEl.placeholder = "Write here...";
          sendBtn.textContent = "Send";
        }
      }

      function renderCurrentChat() {
        const chat = getCurrentChat();
        if (!chat) return;

        messagesEl.innerHTML = "";
        chatTitleEl.textContent = chat.title || "New chat";
        stageEl.value = chat.stage || "IDEA";
        modeEl.value = chat.mode || "AUTO";

        if (!chat.conversation || chat.conversation.length === 0) {
          addSystemWelcome(getWelcomeMessage());
        } else {
          chat.conversation.forEach((msg) => addBubble(msg.role, msg.content));
        }

        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function switchChat(chatId) {
        activeChatId = chatId;
        saveActiveChatId();
        renderChatList();
        renderCurrentChat();
      }

      async function createNewChat() {
        const newChat = {
          id: generateId(),
          title: "New chat",
          stage: "IDEA",
          mode: "AUTO",
          conversation: []
        };

        chats.unshift(newChat);
        activeChatId = newChat.id;
        saveActiveChatId();
        renderChatList();
        renderCurrentChat();
        await saveChatToSupabase(newChat);
      }

      async function clearCurrentChat() {
        const chat = getCurrentChat();
        if (!chat) return;

        chat.conversation = [];
        chat.title = "New chat";
        await persistCurrentState();
      }

      async function updateCurrentChatMeta() {
        const chat = getCurrentChat();
        if (!chat) return;

        chat.stage = stageEl.value;
        chat.mode = modeEl.value;
        await persistCurrentState();
      }

      async function persistCurrentState() {
        const chat = getCurrentChat();
        if (!chat) return;

        renderChatList();
        renderCurrentChat();
        await saveChatToSupabase(chat);
      }

      inputEl.addEventListener("input", autosizeTextarea);

      inputEl.addEventListener("keydown", function (e) {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
          e.preventDefault();
          sendMessage();
        }
      });

      async function sendMessage() {
        const chat = getCurrentChat();
        if (!chat) return;

        const lang = getLanguage();
        const message = inputEl.value.trim();

        if (!message) return;

        chat.stage = stageEl.value;
        chat.mode = modeEl.value;
        chat.conversation.push({ role: "user", content: message });

        if (chat.title === "New chat") {
          chat.title = deriveChatTitle(chat);
        }

        await persistCurrentState();

        inputEl.value = "";
        autosizeTextarea();
        setLoading(true);

        try {
          const r = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message,
              history: chat.conversation,
              language: lang,
              stage: chat.stage,
              mode: chat.mode
            }),
          });

          const raw = await r.text();

          let data;
          try {
            data = JSON.parse(raw);
          } catch {
            chat.conversation.push({ role: "assistant", content: raw });
            await persistCurrentState();
            setLoading(false);
            return;
          }

          const reply = data.reply || "No response.";
          chat.conversation.push({ role: "assistant", content: reply });
          await persistCurrentState();
        } catch (err) {
          const msg = `Error: ${String(err)}`;
          chat.conversation.push({ role: "assistant", content: msg });
          await persistCurrentState();
        } finally {
          setLoading(false);
        }
      }

      async function startApp() {
        await loadCurrentUser();
        showApp();

        loadActiveChatId();
        await migrateLegacyLocalChatsIfNeeded();
        chats = await fetchChatsFromSupabase();

        if (chats.length === 0) {
          await createNewChat();
          chats = await fetchChatsFromSupabase();
        }

        const exists = chats.some((chat) => chat.id === activeChatId);
        if (!exists && chats.length > 0) {
          activeChatId = chats[0].id;
          saveActiveChatId();
        }

        applyLanguageUI();
        renderChatList();
        renderCurrentChat();
        autosizeTextarea();
      }

      async function bootAfterAuth() {
        const lang = localStorage.getItem(STORAGE_KEYS.language);

        if (!lang) {
          showLanguage();
        } else {
          await startApp();
        }
      }

      async function init() {
        const { data } = await supabaseClient.auth.getSession();

        if (!data.session) {
          showAuth();
        } else {
          await bootAfterAuth();
        }

        supabaseClient.auth.onAuthStateChange(async (_event, session) => {
          if (!session) {
            showAuth();
          } else {
            await bootAfterAuth();
          }
        });

        autosizeTextarea();
      }

      init();
    </script>
  </body>
</html>
