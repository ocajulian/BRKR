<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BRKR</title>
  </head>

  <body style="font-family: system-ui; padding: 40px; max-width: 700px; margin:auto; background:#f7f7f7;">
    <h1>BRKR</h1>

    <div style="display:flex; gap:10px; margin: 10px 0;">
      <select id="stage">
        <option value="IDEA">Idea</option>
        <option value="VALIDACION">Validación</option>
        <option value="OFERTA">Oferta</option>
        <option value="ADS">Ads</option>
      </select>

      <select id="mode">
        <option value="CODIR">CODIR</option>
        <option value="CFO">CFO</option>
        <option value="CTO">CTO</option>
        <option value="CMO">CMO</option>
        <option value="SCRAPPING">Scrapping</option>
        <option value="COPYWRITER">Copywriter</option>
        <option value="PM">Project Manager</option>
        <option value="FORMACION">Formación</option>
      </select>
    </div>

    <input
      id="userInput"
      type="text"
      placeholder="Escribe aquí..."
      style="width: 100%; padding: 10px; font-size: 16px;"
    />

    <button
      onclick="sendMessage()"
      style="margin-top: 10px; padding: 10px; font-size: 16px;"
    >
      Enviar
    </button>

    <div id="response" style="margin-top:20px; background:white; padding:15px; border-radius:10px;"></div>

    <script>
      async function sendMessage() {
        const inputEl = document.getElementById("userInput");
        const responseDiv = document.getElementById("response");
        const stage = document.getElementById("stage").value;
        const mode = document.getElementById("mode").value;
        const message = inputEl.value;

        if (!message) {
          return;
        }

        // Mostrar mensaje del usuario
        responseDiv.innerHTML += `
          <div style="margin-top:10px;">
            <strong>Tú:</strong><br>
            ${message}
          </div>
        `;

        inputEl.value = "";

        // Indicador de carga
        responseDiv.innerHTML += `
          <div id="loading" style="margin-top:10px;">
            <em>Pensando…</em>
          </div>
        `;

        try {
          const r = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message, stage, mode }),
          });

          const raw = await r.text();

          let data;
          try {
            data = JSON.parse(raw);
          } catch {
            document.getElementById("loading").remove();
            responseDiv.innerHTML += `<pre>${raw}</pre>`;
            return;
          }

          document.getElementById("loading").remove();

          responseDiv.innerHTML += `
            <div style="margin-top:10px;">
              <strong>BRKR:</strong><br>
              ${data.reply
                .replace(/\n/g, "<br>")
                .replace(/\*\*/g, "")}
            </div>
          `;

          // Auto scroll
          responseDiv.scrollTop = responseDiv.scrollHeight;

        } catch (err) {
          document.getElementById("loading").remove();
          responseDiv.innerHTML += `<div><strong>Error:</strong> ${String(err)}</div>`;
        }
      }
    </script>
  </body>
</html>
