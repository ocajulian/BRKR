<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BRKR</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg:#0b0f14;
  --panel:#12171d;
  --panel-soft:#0f141a;
  --border:#1f2730;
  --text:#e6edf3;
  --muted:#7d8b99;
  --accent:#00e0ff;
  --accent-text:#001418;
}

*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}

.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
  width:260px;
  border-right:1px solid var(--border);
  padding:16px;
}

.chat-item{
  padding:10px;
  border:1px solid var(--border);
  border-radius:10px;
  margin-bottom:8px;
  cursor:pointer;
}

.chat-item:hover{
  background:var(--panel-soft);
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column}

.topbar{
  padding:16px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
}

.messages{
  flex:1;
  padding:20px;
  overflow:auto;
}

.bubble{
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
}

.user{background:#00e0ff;color:#001418}
.assistant{background:#151b22}

/* INPUT */
.composer{
  padding:16px;
  border-top:1px solid var(--border);
}

textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0b0f14;
  color:var(--text);
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:var(--accent);
  color:var(--accent-text);
}

button:hover{
  opacity:0.9;
}
</style>
</head>

<body>
<div class="app">

<div class="sidebar">
  <button onclick="newChat()">+ New</button>
  <div id="chatList"></div>
</div>

<div class="main">
  <div class="topbar">
    <div>BRKR</div>
    <div>
      <button onclick="renameChat()">Rename</button>
      <button onclick="deleteChat()">Delete</button>
    </div>
  </div>

  <div id="messages" class="messages"></div>

  <div class="composer">
    <textarea id="input"></textarea>
    <button onclick="send()">Send</button>
  </div>
</div>

</div>

<script>
const supabase = supabase.createClient(
  "https://wffpwrcmldytgnttjrdo.supabase.co",
  "sb_publishable_-4JKr5Z2U4rMB5mTKlQe7A_bN9p63qz"
);

let chats=[];
let active=null;

/* ========================= */
/* CHAT CORE */
/* ========================= */

function newChat(){
  const chat={
    id:Date.now().toString(),
    title:"New chat",
    messages:[]
  };
  chats.unshift(chat);
  active=chat.id;
  render();
  save(chat);
}

function getChat(){
  return chats.find(c=>c.id===active);
}

function deleteChat(){
  if(!active) return;
  chats=chats.filter(c=>c.id!==active);
  active=chats[0]?.id || null;
  render();
}

function renameChat(){
  const chat=getChat();
  if(!chat) return;
  const name=prompt("Rename",chat.title);
  if(name) chat.title=name;
  render();
}

/* ========================= */
/* RENDER */
/* ========================= */

function render(){
  renderList();
  renderMessages();
}

function renderList(){
  const el=document.getElementById("chatList");
  el.innerHTML="";
  chats.forEach(c=>{
    const d=document.createElement("div");
    d.className="chat-item";
    d.textContent=c.title;
    d.onclick=()=>{
      active=c.id;
      render();
    };
    el.appendChild(d);
  });
}

function renderMessages(){
  const chat=getChat();
  const el=document.getElementById("messages");
  el.innerHTML="";
  if(!chat) return;

  chat.messages.forEach(m=>{
    const d=document.createElement("div");
    d.className="bubble "+m.role;
    d.textContent=m.content;
    el.appendChild(d);
  });
}

/* ========================= */
/* SEND */
/* ========================= */

async function send(){
  const chat=getChat();
  if(!chat) return;

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  chat.messages.push({role:"user",content:text});
  input.value="";
  render();

  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      message:text,
      history:chat.messages
    })
  });

  const data=await res.json();

  chat.messages.push({
    role:"assistant",
    content:data.reply
  });

  render();
  save(chat);
}

/* ========================= */
/* STORAGE */
/* ========================= */

async function save(chat){
  await supabase.from("chats").upsert({
    id:chat.id,
    title:chat.title,
    conversation:chat.messages
  });
}

/* ========================= */
/* INIT */
/* ========================= */

newChat();
</script>

</body>
</html>
