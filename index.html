<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BRKR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      :root {
        --bg: #0b0f14;
        --panel: #12171d;
        --panel-soft: #0f141a;
        --border: #1f2730;

        --text: #e6edf3;
        --muted: #7d8b99;

        --accent: #00e0ff;
        --accent-text: #001418;

        --bubble-user: #00e0ff;
        --bubble-user-text: #001418;

        --bubble-assistant: #151b22;
        --bubble-assistant-text: #e6edf3;

        --input-bg: #0b0f14;

        --shadow: 0 4px 20px rgba(0, 224, 255, 0.08);
      }

      body.theme-dark {
        --bg: #0b0f14;
        --panel: #12171d;
        --panel-soft: #0f141a;
        --border: #1f2730;
        --text: #e6edf3;
        --muted: #7d8b99;
        --accent: #00e0ff;
        --accent-text: #001418;
        --bubble-user: #00e0ff;
        --bubble-user-text: #001418;
        --bubble-assistant: #151b22;
        --bubble-assistant-text: #e6edf3;
        --input-bg: #0b0f14;
        --shadow: 0 4px 20px rgba(0, 224, 255, 0.08);
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .app-shell { height: 100vh; display: flex; }
      .sidebar { width: 280px; border-right: 1px solid var(--border); background: var(--panel); display: none; flex-direction: column; }

      .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
      .brand-title { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
      .brand-subtitle { color: var(--muted); }

      .sidebar-list { flex: 1; overflow-y: auto; padding: 10px; }

      .chat-item {
        padding: 12px;
        margin-bottom: 8px;
        border-radius: 14px;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--panel);
      }

      .chat-item.active {
        border-color: var(--accent);
        box-shadow: 0 0 8px rgba(0,224,255,0.2);
      }

      .main { flex: 1; display: flex; flex-direction: column; }

      .topbar {
        padding: 18px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }

      .chat-title {
        font-size: 28px;
        font-weight: 800;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .bubble-row { display: flex; }
      .bubble-row.user { justify-content: flex-end; }

      .bubble {
        max-width: 720px;
        padding: 14px 16px;
        border-radius: 18px;
        box-shadow: var(--shadow);
        line-height: 1.55;
      }

      .bubble.user {
        background: var(--bubble-user);
        color: var(--bubble-user-text);
        font-weight: 600;
      }

      .bubble.assistant {
        background: var(--bubble-assistant);
        color: var(--bubble-assistant-text);
        border: 1px solid var(--border);
      }

      .composer {
        border-top: 1px solid var(--border);
        background: var(--panel);
        padding: 16px;
      }

      .text-area {
        width: 100%;
        resize: none;
        padding: 16px;
        font-size: 16px;
        background: var(--input-bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 14px;
      }

      .btn {
        padding: 10px 14px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
      }

      .btn-primary {
        border: none;
        background: var(--accent);
        color: var(--accent-text);
        font-weight: 700;
        box-shadow: 0 0 0 0 rgba(0,224,255,0.6);
        transition: all 0.15s ease;
      }

      .btn-primary:hover {
        box-shadow: 0 0 12px rgba(0,224,255,0.6);
        transform: translateY(-1px);
      }

      .status {
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>

  <body class="theme-dark">
    <div class="app-shell">
      <main class="main">
        <div class="topbar">
          <div class="chat-title">BRKR</div>
        </div>

        <div id="messages" class="messages"></div>

        <div class="composer">
          <textarea id="userInput" class="text-area" placeholder="Write here..."></textarea>

          <div style="display:flex; justify-content:space-between; margin-top:10px;">
            <div id="status" class="status">Ready.</div>
            <button id="sendBtn" class="btn btn-primary">Send</button>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
