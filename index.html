<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BRKR</title>
  </head>

  <body style="margin:0; font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f3f4f6; color:#111827;">
    <div style="max-width:900px; margin:0 auto; height:100vh; display:flex; flex-direction:column;">

      <!-- LANGUAGE SCREEN -->
      <div id="languageScreen" style="display:none; flex:1; align-items:center; justify-content:center; padding:24px;">
        <div style="background:white; border:1px solid #e5e7eb; border-radius:18px; padding:32px; width:100%; max-width:520px; box-sizing:border-box;">
          <div style="font-size:42px; font-weight:800; letter-spacing:-1px; margin-bottom:12px;">BRKR</div>

          <div style="font-size:18px; font-weight:700; margin-bottom:4px;">Select your language:</div>
          <div style="font-size:18px; font-weight:700; margin-bottom:4px;">Selecciona tu idioma:</div>
          <div style="font-size:18px; font-weight:700; margin-bottom:20px;">Sélectionnez votre langue :</div>

          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <button onclick="setLanguage('en')" style="padding:14px 16px; border:none; border-radius:12px; background:#111827; color:white; font-size:15px; cursor:pointer;">English</button>
            <button onclick="setLanguage('es')" style="padding:14px 16px; border:none; border-radius:12px; background:#111827; color:white; font-size:15px; cursor:pointer;">Español</button>
            <button onclick="setLanguage('fr')" style="padding:14px 16px; border:none; border-radius:12px; background:#111827; color:white; font-size:15px; cursor:pointer;">Français</button>
            <button onclick="setLanguage('other')" style="padding:14px 16px; border:1px solid #d1d5db; border-radius:12px; background:white; color:#111827; font-size:15px; cursor:pointer;">Other</button>
          </div>
        </div>
      </div>

      <!-- CHAT SCREEN -->
      <div id="chatScreen" style="display:none; flex:1; flex-direction:column; min-height:0;">
        <div style="padding:20px; border-bottom:1px solid #e5e7eb; background:white;">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px;">
            <div>
              <div style="font-size:36px; font-weight:800; letter-spacing:-1px;">BRKR</div>
              <div id="topHint" style="margin-top:6px; font-size:14px; color:#6b7280;">
                Business decision engine.
              </div>
            </div>

            <button
              onclick="changeLanguage()"
              style="padding:10px 12px; font-size:13px; border:1px solid #d1d5db; border-radius:10px; background:white; color:#111827; cursor:pointer;"
            >
              Change language
            </button>
          </div>

          <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:16px;">
            <div>
              <label for="stage" style="display:block; font-size:12px; color:#6b7280; margin-bottom:4px;">Stage</label>
              <select id="stage" style="padding:10px 12px; font-size:14px; border:1px solid #d1d5db; border-radius:10px; background:white;">
                <option value="IDEA">IDEA</option>
                <option value="VALIDACION">VALIDATION</option>
                <option value="OFERTA">OFFER</option>
                <option value="ADS">ADS</option>
              </select>
            </div>

            <div>
              <label for="mode" style="display:block; font-size:12px; color:#6b7280; margin-bottom:4px;">Mode</label>
              <select id="mode" style="padding:10px 12px; font-size:14px; border:1px solid #d1d5db; border-radius:10px; background:white;">
                <option value="AUTO">AUTO</option>
                <option value="CODIR">CODIR</option>
                <option value="CFO">CFO</option>
                <option value="CTO">CTO</option>
                <option value="CMO">CMO</option>
                <option value="SCRAPPING">SCRAPPING</option>
                <option value="COPYWRITER">COPYWRITER</option>
                <option value="PM">PM</option>
                <option value="FORMACION">TRAINING</option>
              </select>
            </div>
          </div>
        </div>

        <div id="messages" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px;"></div>

        <div style="border-top:1px solid #e5e7eb; background:white; padding:16px 20px 20px 20px;">
          <textarea
            id="userInput"
            placeholder="Write here..."
            rows="3"
            style="width:100%; resize:none; padding:14px 16px; font-size:16px; line-height:1.5; border:1px solid #d1d5db; border-radius:14px; outline:none; box-sizing:border-box;"
          ></textarea>

          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px; gap:12px;">
            <div id="status" style="font-size:13px; color:#6b7280;">Ready.</div>
            <button
              id="sendBtn"
              onclick="sendMessage()"
              style="padding:12px 18px; font-size:15px; font-weight:600; border:none; border-radius:12px; background:#111827; color:white; cursor:pointer;"
            >
              Send
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let conversation = [];

      const messagesEl = document.getElementById("messages");
      const inputEl = document.getElementById("userInput");
      const statusEl = document.getElementById("status");
      const sendBtn = document.getElementById("sendBtn");
      const topHintEl = document.getElementById("topHint");

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function formatReply(text) {
        return escapeHtml(text)
          .replace(/\*\*/g, "")
          .replace(/^###\s?(.*)$/gm, "<strong>$1</strong>")
          .replace(/\n/g, "<br>");
      }

      function addBubble(role, content) {
        const isUser = role === "user";
        const wrapper = document.createElement("div");
        wrapper.style.display = "flex";
        wrapper.style.justifyContent = isUser ? "flex-end" : "flex-start";

        const bubble = document.createElement("div");
        bubble.style.maxWidth = "760px";
        bubble.style.padding = "14px 16px";
        bubble.style.borderRadius = "14px";
        bubble.style.border = "1px solid #e5e7eb";
        bubble.style.background = isUser ? "#111827" : "#ffffff";
        bubble.style.color = isUser ? "#ffffff" : "#111827";
        bubble.style.lineHeight = "1.5";

        const label = document.createElement("div");
        label.textContent = isUser ? "You" : "BRKR";
        label.style.fontSize = "12px";
        label.style.fontWeight = "700";
        label.style.marginBottom = "6px";
        label.style.color = isUser ? "#d1d5db" : "#6b7280";

        const body = document.createElement("div");
        body.innerHTML = isUser
          ? escapeHtml(content).replace(/\n/g, "<br>")
          : formatReply(content);

        bubble.appendChild(label);
        bubble.appendChild(body);
        wrapper.appendChild(bubble);
        messagesEl.appendChild(wrapper);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function autosizeTextarea() {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 220) + "px";
      }

      function setLoading(on) {
        const lang = localStorage.getItem("brkr_lang") || "en";
        sendBtn.disabled = on;
        sendBtn.style.opacity = on ? "0.7" : "1";
        sendBtn.style.cursor = on ? "default" : "pointer";

        if (lang === "es") {
          statusEl.textContent = on ? "BRKR está pensando…" : "Listo.";
        } else if (lang === "fr") {
          statusEl.textContent = on ? "BRKR réfléchit…" : "Prêt.";
        } else {
          statusEl.textContent = on ? "BRKR is thinking…" : "Ready.";
        }
      }

      function setLanguage(lang) {
        localStorage.setItem("brkr_lang", lang);
        startChat();
      }

      function changeLanguage() {
        localStorage.removeItem("brkr_lang");
        conversation = [];
        messagesEl.innerHTML = "";
        document.getElementById("chatScreen").style.display = "none";
        document.getElementById("languageScreen").style.display = "flex";
      }

      function startChat() {
        const lang = localStorage.getItem("brkr_lang");

        document.getElementById("languageScreen").style.display = "none";
        document.getElementById("chatScreen").style.display = "flex";

        if (lang === "es") {
          topHintEl.textContent = "Motor de decisión business.";
          statusEl.textContent = "Listo.";
          inputEl.placeholder = "Escribe aquí...";
          sendBtn.textContent = "Enviar";
          addSystemWelcome("BRKR responderá en español. Puedes dejar AUTO o elegir stage y mode manualmente.");
        } else if (lang === "fr") {
          topHintEl.textContent = "Moteur de décision business.";
          statusEl.textContent = "Prêt.";
          inputEl.placeholder = "Écrivez ici...";
          sendBtn.textContent = "Envoyer";
          addSystemWelcome("BRKR répondra en français. Vous pouvez laisser AUTO ou choisir stage et mode manuellement.");
        } else if (lang === "other") {
          topHintEl.textContent = "Business decision engine.";
          statusEl.textContent = "Ready.";
          inputEl.placeholder = "Write in your language...";
          sendBtn.textContent = "Send";
          addSystemWelcome("Write in your language. BRKR will adapt automatically. You can also choose stage and mode manually.");
        } else {
          topHintEl.textContent = "Business decision engine.";
          statusEl.textContent = "Ready.";
          inputEl.placeholder = "Write here...";
          sendBtn.textContent = "Send";
          addSystemWelcome("BRKR will reply in English. You can leave AUTO on or choose stage and mode manually.");
        }
      }

      function addSystemWelcome(text) {
        if (messagesEl.children.length > 0) return;

        const wrapper = document.createElement("div");
        wrapper.style.display = "flex";
        wrapper.style.justifyContent = "flex-start";

        const bubble = document.createElement("div");
        bubble.style.maxWidth = "760px";
        bubble.style.padding = "14px 16px";
        bubble.style.borderRadius = "14px";
        bubble.style.border = "1px solid #e5e7eb";
        bubble.style.background = "#ffffff";
        bubble.style.color = "#111827";
        bubble.style.lineHeight = "1.5";

        const label = document.createElement("div");
        label.textContent = "BRKR";
        label.style.fontSize = "12px";
        label.style.fontWeight = "700";
        label.style.marginBottom = "6px";
        label.style.color = "#6b7280";

        const body = document.createElement("div");
        body.innerHTML = escapeHtml(text);

        bubble.appendChild(label);
        bubble.appendChild(body);
        wrapper.appendChild(bubble);
        messagesEl.appendChild(wrapper);
      }

      inputEl.addEventListener("input", autosizeTextarea);

      inputEl.addEventListener("keydown", function (e) {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
          e.preventDefault();
          sendMessage();
        }
      });

      async function sendMessage() {
        const lang = localStorage.getItem("brkr_lang") || "en";
        const stage = document.getElementById("stage").value;
        const mode = document.getElementById("mode").value;
        const message = inputEl.value.trim();

        if (!message) return;

        addBubble("user", message);
        conversation.push({ role: "user", content: message });

        inputEl.value = "";
        autosizeTextarea();
        setLoading(true);

        try {
          const r = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message,
              history: conversation,
              language: lang,
              stage,
              mode
            }),
          });

          const raw = await r.text();

          let data;
          try {
            data = JSON.parse(raw);
          } catch {
            addBubble("assistant", raw);
            conversation.push({ role: "assistant", content: raw });
            setLoading(false);
            return;
          }

          const reply = data.reply || "No response.";
          addBubble("assistant", reply);
          conversation.push({ role: "assistant", content: reply });
        } catch (err) {
          const msg = `Error: ${String(err)}`;
          addBubble("assistant", msg);
          conversation.push({ role: "assistant", content: msg });
        } finally {
          setLoading(false);
        }
      }

      function init() {
        const lang = localStorage.getItem("brkr_lang");

        if (!lang) {
          document.getElementById("languageScreen").style.display = "flex";
          document.getElementById("chatScreen").style.display = "none";
        } else {
          startChat();
        }

        autosizeTextarea();
      }

      init();
    </script>
  </body>
</html>
